name: signap_signals
description: >-
  Signap — Flutter SDK for visitor identification and cross-platform
  stitching. A thin bridge over the native iOS/Android SDKs.
version: 0.1.0
publish_to: none # brand-gated — not published to pub.dev yet (handoff M6/M7)

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.signap.sdk.flutter
        pluginClass: SignapPlugin
      ios:
        pluginClass: SignapPlugin
