name: signap_signals
description: >-
  Signap — Flutter SDK for visitor identification and cross-platform
  stitching. A thin bridge over the native iOS/Android SDKs.
version: 0.1.0
homepage: https://signap.io
# NOTE: publishing to pub.dev is a Dev-7 release step (mirror the native M7 flow).
# `flutter pub publish` targets pub.dev by default now that the `publish_to: none`
# guard is removed. See docs/phase3/design/mobile-rn-flutter-publish-handoff.md.

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.signap.sdk.flutter
        pluginClass: SignapPlugin
      ios:
        pluginClass: SignapPlugin
